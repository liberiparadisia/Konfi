const calculateMetrics = (form, dims) => {
  const a = parseFloat(dims.a || 0) / 100;
  const b = parseFloat(dims.b || 0) / 100;
  const c = parseFloat(dims.c || 0) / 100;
  const d = parseFloat(dims.d || 0) / 100;
  const e = parseFloat(dims.e || 0) / 100;

  if (form?.id === "9") {
    if (!a || !b || !c || !d) {
      return { surface: 0, volume: 0 };
    }
    const surface = (2 * (a * b + a * c + b * c)) + (2 * (a * b + a * d + b * d));
    const volume = (a * b * c) + (a * b * d);
    return { surface, volume };
  }

  if (form?.id === "22") {
    if (!a || !b || !c || !d || !e) {
      return { surface: 0, volume: 0 };
    }
    const surface =
      (2 * (a * b + a * c + b * c)) +
      (2 * (a * b + a * d + b * d)) +
      (2 * (a * b + a * e + b * e));
    const volume = (a * b * c) + (a * b * d) + (a * b * e);
    return { surface, volume };
  }

  if (!a || !b || !c) {
    return { surface: 0, volume: 0 };
